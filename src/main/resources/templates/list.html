<div th:replace="~{fragments/header}"/>
<body>
<div class="patient-list">

    <form>
        <span id="menubar">
            <button type="button" th:onclick="|window.location.href='/'|">All</button>
            <button type="button" th:onclick="|window.location.href='/registered'|">Registered</button>
            <button type="button" th:onclick="|window.location.href='/invited'|">Invited</button>
            <button type="button" th:onclick="|window.location.href='/discharged'|">Discharged</button>
        </span>
        <div>Patients in list: <span th:text="${patients.size()}"></span></div>
        <br>    
        <div id="list">
            <table>
                <thead>
                <tr>
                    <th style="width: 20%">First Name</th>
                    <th style="width: 20%">Family Name</th>
                    <th>Registered</th>
                    <th>Invited</th>
                    <th>Discharged</th>
                </tr>
                </thead>
                <tbody th:each="patient : ${patients}">
                <tr>
                <tr th:if="${patients.empty}">
                    <td colspan="5">No Patients to show</td>
                </tr>
                <tr style="vertical-align: top">
                    <td th:text="${patient.givenName}"></td>
                    <td th:text="${patient.familyName}"></td>
                    <td><span th:if="${patient.whenRegistered}" th:text="${datetime.format(patient.whenRegistered)}"
                              Registered </span></td>
                    <td><span th:if="${patient.whenInvited}" th:text="${datetime.format(patient.whenInvited)}"
                              Invited </span></td>
                    <td><span th:if="${patient.whenDischarged}" th:text="${datetime.format(patient.whenDischarged)}"
                              Discharged </span></td>

                </tr>
                </tbody>
            </table>
        </div>
    </form>
</div>
</body>
